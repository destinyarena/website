name: Build and Deploy

on:
  push:
    branches: [ master ]

env:
  APPNAME: website
  
jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v1
      
    - name: Set up Docker Context for Buildx
      id: buildx-context
      run: |
        docker context create builders
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v1
      with:
        version: latest
        endpoint: builders
    - name: Login to Github Packages
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build and push to harbor
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: |
          ghcr.io/destinyarena/${{ env.APPNAME }}:latest
          ghcr.io/destinyarena/${{ env.APPNAME }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    steps:
    - name: Checkout Helm Repo
      uses: actions/checkout@v2
      with:
        repository: destinyarena/helm-charts
        token: ${{ secrets.DESTINYARENA_ACTIONS }}
    - name: Installs yq
      run: |
        sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys CC86BB64
        sudo add-apt-repository ppa:rmescandon/yq
        sudo apt update
        sudo apt install yq -y
    - name: Update the Helm Chart values.yaml
      run: |
        yq w -i values.yaml ${{ env.APPNAME }}.image.tag ${{ github.sha }}
    - name: Commit and Push
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git commit -am "Updating Image Tag: ${{ github.sha }}"
        git push origin master
